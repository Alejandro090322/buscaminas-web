<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jugar al Buscaminas — Nivel Experto (30x16) — Buscaminas Experto</title>
<meta name="description" content="Juega gratis al Buscaminas nivel Experto, tablero 30x16 con 99 minas, online y sin descargas ni registro.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../../css/styles.css">
<link rel="stylesheet" href="styles.css">
<style>
  /* Único ajuste de CSS propio de este nivel: ver el porqué en el
     comentario de cabecera de styles.css (--bm-board-max-width cambia de
     valor por breakpoint, así que no puede fijarse desde JS). El resto
     de la configuración del nivel (cols/rows/minas/cell-min) vive en
     niveles.js.

     Valores de --bm-board-max-width provisionales, extrapolados de la
     progresión Principiante→Intermedio (más anchos, porque el tablero es
     mucho más ancho que alto: 30x16). Ajustar aquí si tras probarlo en
     pantalla real conviene otro techo. */
  :root { --bm-board-max-width: 640px; }
  @media (min-width: 1024px) {
    :root { --bm-board-max-width: 900px; }
  }
</style>
</head>
<body class="page-jugar">

<main>
  <div class="bm-page">
    <div class="bm-layout">

      <div class="bm-panel">
        <a href="../../index.html" class="bm-logo" aria-label="Buscaminas Experto — Ir a inicio">
          <span class="bm-logo-mark" aria-hidden="true"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <rect x="4" y="4" width="56" height="56" rx="8" fill="#E3E1DA"/>
  <path d="M7 57 L7 7 L57 7" stroke="#F4F3EF" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M9 59 L59 59 L59 9" stroke="#B4B2A9" stroke-width="4" fill="none" stroke-linecap="round"/>
  <line x1="26" y1="48" x2="26" y2="16" stroke="#6B6A64" stroke-width="4" stroke-linecap="round"/>
  <polygon points="26,16 47,23.5 26,31" fill="#E53935"/>
</svg></span>
          <span class="bm-logo-word"><span class="bm-logo-word-dark">Buscaminas</span> <span class="bm-logo-word-accent">Experto</span></span>
        </a>

        <div class="bm-info bm-info--nivel">
          <span class="bm-info-label">Nivel</span>
          <span class="bm-info-value" data-bm-nivel-nombre></span>
        </div>

        <div class="bm-hud-row">
          <div class="bm-info bm-info--tiempo">
            <span class="bm-info-label">Tiempo</span>
            <span class="bm-info-value" id="bm-cronometro" aria-live="polite">0</span>
          </div>

          <button type="button" class="bm-reset" id="bm-reset" aria-label="Reiniciar partida">
            <svg class="bm-reset-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="21 3 21 9 15 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="bm-reset-text">Reiniciar</span>
          </button>

          <div class="bm-info bm-info--minas">
            <span class="bm-info-label">Minas</span>
            <span class="bm-info-value" id="bm-contador-minas" aria-live="polite">0</span>
          </div>
        </div>
      </div>

      <div class="bm-main">
        <div class="bm-board-wrap">
          <div class="bm-board" id="bm-board" role="grid"></div>
        </div>
      </div>

      <!-- TODO: integrar anuncio real aquí (ver documento de monetización) -->
      <div class="ad-slot bm-ad-slot ad-slot--placeholder-hidden" aria-hidden="true">Espacio reservado para anuncio</div>

    </div>

    <p class="bm-mensaje" id="bm-mensaje" role="status" aria-live="assertive"></p>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <p class="footer-note">© 2026 Buscaminas Experto</p>
    <div class="footer-legal">
      <a href="../../legal/aviso-legal.html">Aviso legal</a>
      <a href="../../legal/privacidad.html">Privacidad</a>
      <a href="../../legal/cookies.html">Cookies</a>
      <a href="../../legal/condiciones-uso.html">Condiciones de uso</a>
      <a href="../../legal/contacto.html">Contacto</a>
    </div>
  </div>
</footer>

<script src="niveles.js"></script>
<script>BuscaminasNiveles.aplicar('experto');</script>
<script src="../motor/board.js"></script>
<script src="../motor/render.js"></script>
<script src="layout.js"></script>
</body>
</html>
